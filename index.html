<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGO Island</title>
    <link rel="icon" type="image/jpeg" href="location_images/favicon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Fredoka+One&display=swap"
      rel="stylesheet"
    />

    <!-- Styles in dependency order -->
    <link rel="stylesheet" href="css/variables.css?v=8" />
    <link rel="stylesheet" href="css/reset.css?v=8" />
    <link rel="stylesheet" href="css/layout.css?v=8" />
    <link rel="stylesheet" href="css/island.css?v=8" />
    <link rel="stylesheet" href="css/panel.css?v=8" />
    <link rel="stylesheet" href="css/charts.css?v=8" />
    <link rel="stylesheet" href="css/animations.css?v=9" />

    <!-- D3 v7 and PapaParse from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  </head>

  <body>
    <!-- ── Loading screen ─────────────────────────────────────────────────── -->
    <div id="loading-screen" role="status" aria-live="polite">
      <div class="loading-ring"></div>
      <p>Loading LEGO Island</p>
    </div>

    <!-- ── Story nav button ────────────────────────────────────────────── -->
    <a id="story-btn" href="story.html" aria-label="Open data story">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Data Story
    </a>
    <style>
      #story-btn {
        position: fixed;
        top: 16px; right: 16px;
        z-index: 200;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 16px;
        border-radius: 100px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.22);
        color: rgba(255,255,255,0.88);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        text-decoration: none;
        font-family: var(--font-body, system-ui);
        transition: background 160ms, color 160ms, border-color 160ms, transform 160ms;
        box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      }
      #story-btn:hover {
        background: rgba(255,255,255,0.22);
        color: #fff;
        border-color: rgba(255,255,255,0.45);
        transform: translateY(-1px);
      }
    </style>

    <!-- ── Page title ────────────────────────────────────────────────────── -->

    <div id="page-title" aria-hidden="true">
      <h1>
        <span class="lego-brick" style="--brick-bg: #e3000b">L</span
        ><span class="lego-brick" style="--brick-bg: #006cb7">E</span
        ><span
          class="lego-brick"
          style="--brick-bg: #f2cd37; --brick-text: #1a1a1a"
          >G</span
        ><span class="lego-brick" style="--brick-bg: #00a650">O</span>
        <span class="lego-word-gap"></span>
        <span class="lego-brick" style="--brick-bg: #e3000b">I</span
        ><span class="lego-brick" style="--brick-bg: #006cb7">S</span
        ><span
          class="lego-brick"
          style="--brick-bg: #f2cd37; --brick-text: #1a1a1a"
          >L</span
        ><span class="lego-brick" style="--brick-bg: #e3000b">A</span
        ><span class="lego-brick" style="--brick-bg: #00a650">N</span
        ><span class="lego-brick" style="--brick-bg: #006cb7">D</span>
      </h1>
      <p>A visual journey through 50 years of sets</p>
    </div>

    <!-- ── Year interval slider ─────────────────────────────────────────── -->
    <div
      id="year-slider-panel"
      role="group"
      aria-label="Filter sets by year interval"
    >
      <div class="slider-content">
        <div class="slider-header-new">
          <span id="slider-range-label" class="slider-year-text"
            >1970 &ndash; 2022</span
          >
          <span id="slider-count-label" class="slider-count-text"
            >... sets</span
          >
        </div>
        <div class="slider-track-container">
          <input
            type="range"
            id="slider-year-start"
            min="1970"
            max="2022"
            value="1970"
            aria-label="Start year"
          />
          <input
            type="range"
            id="slider-year-end"
            min="1970"
            max="2022"
            value="2022"
            aria-label="End year"
          />
          <div class="slider-track-fill" id="slider-track-fill"></div>
        </div>
        <div class="slider-ticks">
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">1970</div>
          </div>
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">1980</div>
          </div>
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">1990</div>
          </div>
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">2000</div>
          </div>
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">2010</div>
          </div>
          <div class="tick">
            <div class="tick-mark"></div>
            <div class="tick-label">2020</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Main scene ────────────────────────────────────────────────────── -->
    <main class="scene" id="scene" role="main">
      <!-- Layer 0: Water ripple canvas (z-index 1) -->
      <canvas id="water-canvas" aria-hidden="true"></canvas>

    <!-- Layer 1: Island SVG (z-index 2, parallax ±3px) -->
    <div class="layer" id="layer-island">
      <div class="island-svg-wrapper">

        <!-- Island SVG — viewBox 0 0 1100 720 -->
        <svg id="island-svg" width="100%" viewBox="0 0 1100 720" role="img" xmlns="http://www.w3.org/2000/svg"
          aria-label="LEGO Island map">

          <!-- Island background image — replaces all hand-drawn SVG paths -->
          <!-- The viewBox (0 0 1100 720) is preserved, so all district bubble
               positions computed in island.js remain pixel-accurate. -->
          <image
            href="location_images/_lego_island.png"
            x="0" y="0"
            width="1100" height="720"
            preserveAspectRatio="xMidYMid meet"
          />

        </svg>
      </div>
    </div>

      <!-- Layer 2: District markers (z-index 4, parallax ±10px) -->
      <div
        class="layer"
        id="layer-districts"
        aria-label="Island districts"
        role="region"
      >
        <div class="island-svg-wrapper" id="districts-wrapper"></div>
      </div>
    </main>

    <!-- ── Panel overlay backdrop ────────────────────────────────────────── -->
    <div id="panel-overlay" aria-hidden="true"></div>

    <!-- ── Detail panel ──────────────────────────────────────────────────── -->
    <aside id="detail-panel" aria-label="District details" role="complementary">
      <!-- Content injected by panel.js -->
    </aside>

    <!-- ── Shared tooltip for D3 charts ─────────────────────────────────── -->
    <div id="chart-tooltip" role="tooltip" aria-hidden="true"></div>

    <!-- ── JavaScript — in dependency order ──────────────────────────────── -->
    <script src="js/districts.js?v=7"></script>
    <script src="js/data.js?v=7"></script>
    <script src="js/water.js?v=7"></script>
    <script src="js/parallax.js?v=7"></script>
    <script src="js/charts.js?v=7"></script>
    <script src="js/panel.js?v=7"></script>
    <script src="js/island.js?v=7"></script>
    <script src="js/main.js?v=7"></script>
    <script src="js/easter-egg.js?v=1"></script>
    <script src="js/jetski.js?v=2"></script>
  </body>
</html>
